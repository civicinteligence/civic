name: Civic Intelligence CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - uses: actions/checkout@v4

      # Set working directory to civic/civic
      - name: Set working directory
        run: cd civic

      # Set up Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install dependencies
      - run: pip install -r civic/requirements.txt

      # Run migrations
      - run: python civic/manage.py migrate

      # Run tests
      - run: python civic/manage.py test

      # Docker login
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker image
      - name: Build Docker image
        run: docker build -t civicintelligence/civicintelligence:latest civic

      # Push Docker image
      - name: Push Docker image
        run: docker push civicintelligence/civicintelligence:latest
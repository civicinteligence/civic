name: Civic Intelligence CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - uses: actions/checkout@v4

      # Set up Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install dependencies
      - run: pip install -r requirements.txt

      # Run migrations
      - run: python manage.py migrate

      # Run tests
      - run: python manage.py test

      # 6. Set up Docker
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker image
      - name: Build Docker image
        run: docker build -t docker push ugkimtech/civicintelligence:latest .

      # 8. Push Docker image
      - name: Push Docker image
        run: docker push docker push ugkimtech/civicintelligence:latest
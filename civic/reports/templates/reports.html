{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="{% static 'pic.png' %}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report issue - Civic Intelligence</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-container {
            display: flex;
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            transition: transform 0.3s ease;
            padding: 3px;
        }

        .brand-side {
            flex: 1;
            background: linear-gradient(145deg, #161616 0%, #2a2a2a 100%);
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .logo-placeholder {
            width: 100px;
            height: 100px;
            background: black;
            border-radius: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .logo-placeholder img {
            width: 100%;
            height: 100%;
            border-radius: 100%;
            object-fit: cover;
        }

        .brand-side h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }

        .brand-side p {
            font-size: 1rem;
            opacity: 0.8;
            line-height: 1.5;
            max-width: 280px;
        }

        .form-side {
            flex: 1;
            padding: 3rem 2.5rem;
            background: white;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: flex-start;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 1rem;
            color: #9ca3af;
            font-size: 1.1rem;
        }

        .input-wrapper input, .input-wrapper textarea {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            background: #fefefe;
        }

        .input-wrapper textarea {
            min-height: 120px;
            resize: vertical;
        }

        .input-wrapper input:focus, .input-wrapper textarea:focus {
            outline: none;
            border-color: #fe2c55;
            box-shadow: 0 0 0 3px rgba(254, 44, 85, 0.1);
        }

        .login-btn {
            width: 100%;
            background: #111111;
            color: white;
            border: none;
            padding: 0.875rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            background: #222222;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px -6px rgba(254, 44, 85, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
                max-width: 450px;
            }

            .brand-side {
                padding: 2rem;
            }

            .form-side {
                padding: 2rem 1.5rem;
            }

            .brand-side h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div id="main" class="login-container">
        <div class="brand-side">
            <div class="logo-placeholder">
                <img src="{% static 'images/flag.png' %}" alt="logo">
            </div>
            <h1>Citizens Reporting</h1>
            <p>Report any public services related issue below.</p>
        </div>

        <div id="form" class="form-side">
            <form action="{% url 'submit_report' %}" method="POST">
                {% csrf_token %}
                
                <div class="input-group">
                    <label class="input-label">Message</label>
                    <div class="input-wrapper">
                        <i class="fas fa-inbox"></i>
                        <textarea name="message" placeholder="Describe the issue" required></textarea>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Location</label>
                    <div class="input-wrapper">
                        <i class="fas fa-location-dot"></i>
                        <input id="location" type="text" name="location" placeholder="Detecting your location..." required>
                        
                    </div>
                </div>
                <input id="coordinates" type="text" name="coordinates" hidden>
                
                <button type="submit" class="login-btn">Submit Report</button>
            </form>
        </div>
    </div>

    <script>
 window.addEventListener('DOMContentLoaded', () => {
            getLocation();
            
            const msg = "{{ msg|escapejs }}";
            if (msg && msg !== "None" && msg.trim() !== "") {
                alert(msg);
            }
        });

        function getLocation() {
            const locationInput = document.getElementById("location");

            if (!navigator.geolocation) {
                locationInput.placeholder = "Geolocation not supported by your browser";
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async function(position) {
                    let latitude = position.coords.latitude;
                    let longitude = position.coords.longitude;

                    if (latitude && longitude) {
                        document.getElementById("coordinates").value = `${latitude},${longitude}`;
                        locationInput.value = "Fetching address components...";
                        const addressText = await getPlaceName(latitude, longitude);
                        locationInput.value = addressText;
                        
                    } else {
                        locationInput.placeholder = "Failed to pinpoint coordinates.";
                    }
                },
                function(error) {
                    console.error("Geolocation Error:", error);
                    locationInput.placeholder = "Location permission denied/unavailable";
                }
            );
        }

        async function getPlaceName(lat, lon) {
            const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`;

            try {
                const response = await fetch(url, {
                    headers: {
                        'User-Agent': 'Civic-Intelligence-App/1.0'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                if (data && data.address) {
                    
                    const road = data.address.road || '';
                    const suburb = data.address.suburb || '';
                    const urbanArea = data.address.city || data.address.town || data.address.village || '';
                    const county = data.address.county || '';
                    
                    return [road, suburb, urbanArea, county].filter(Boolean).join(', ');
                } else {
                    return 'Location mapped, details missing';
                }
            } catch (error) {
                console.error("Error fetching reverse geocode location data:", error);
                return 'Lookup Error)';
            }
        }
    </script>
</body>
</html>
